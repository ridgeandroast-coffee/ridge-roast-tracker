:root{
  --espresso:#2B1B14;
  --espresso-light:#4A3326;
  --crema:#F6EEE1;
  --crema-dim:#ECE2D1;
  --card-bg:#FFFFFF;
  --terracotta:#C1622D;
  --terracotta-dark:#A24E22;
  --moss:#5C6B47;
  --rust:#9C3D2E;
  --gold:#C99A3E;
  --ink:#2B1B14;
  --muted:#8A7A68;
  --border:#E3D6C2;
  --radius:16px;
  --shadow:0 4px 16px rgba(43,27,20,0.08);
  --font-display:'Fraunces', Georgia, serif;
  --font-body:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

#rr-app *{ box-sizing:border-box; }
#rr-app{
  font-family:var(--font-body);
  color:var(--ink);
  max-width:760px;
  margin:0 auto;
}

/* ---- header ---- */
.rr-header{
  background:linear-gradient(135deg, var(--espresso) 0%, var(--espresso-light) 100%);
  color:var(--crema);
  border-radius:var(--radius);
  padding:26px 26px 22px;
  box-shadow:var(--shadow);
}
.rr-brand-name{
  font-family:var(--font-display);
  font-weight:700;
  font-size:21px;
  letter-spacing:0.3px;
}
.rr-brand-name span{ font-weight:400; opacity:0.82; font-size:17px; margin-left:6px; }
.rr-brand-sub{ font-size:12.5px; color:rgba(246,238,225,0.62); margin-top:5px; }
.rr-header-stats{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  margin-top:22px;
  gap:18px;
  flex-wrap:wrap;
}
.rr-countdown-num{ font-family:var(--font-display); font-weight:800; font-size:48px; line-height:1; }
.rr-countdown-label{ font-size:12.5px; color:rgba(246,238,225,0.72); margin-top:3px; }
.rr-countdown-date{
  font-size:11.5px;
  color:rgba(246,238,225,0.5);
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:6px;
}
.rr-countdown-date input[type=date]{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  color:var(--crema);
  border-radius:6px;
  padding:3px 6px;
  font-size:12px;
  font-family:var(--font-body);
  color-scheme:dark;
}
.rr-cup-wrap{ text-align:center; flex-shrink:0; }
.rr-cup-svg{ width:60px; height:78px; display:block; margin:0 auto; }
.rr-cup-outline{ fill:rgba(255,255,255,0.05); stroke:rgba(246,238,225,0.4); stroke-width:2.5; }
.rr-cup-lid{ fill:var(--crema); opacity:0.92; }
.rr-cup-hole{ fill:var(--espresso); }
.rr-cup-fill{ transition:y 0.6s ease, height 0.6s ease; }
.rr-cup-crema{ opacity:0.9; transition:y 0.6s ease; }
.rr-cup-pct{ font-family:var(--font-display); font-weight:700; font-size:18px; margin-top:6px; }
.rr-cup-label{ font-size:10.5px; color:rgba(246,238,225,0.6); margin-top:1px; max-width:92px; line-height:1.3; }

/* ---- categories ---- */
.rr-categories{ display:flex; flex-direction:column; gap:14px; margin-top:18px; }
.rr-card{ background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.rr-card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 18px;
  cursor:pointer;
  user-select:none;
  gap:12px;
}
.rr-card-title{ font-family:var(--font-display); font-weight:600; font-size:16px; color:var(--ink); }
.rr-card-meta{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
.rr-card-bar{ width:56px; height:6px; background:var(--crema-dim); border-radius:4px; overflow:hidden; }
.rr-card-bar-fill{ height:100%; background:linear-gradient(90deg, var(--terracotta), var(--moss)); border-radius:4px; transition:width 0.4s ease; }
.rr-card-frac{ font-size:12px; color:var(--muted); font-weight:600; min-width:28px; text-align:right; }
.rr-chevron{ font-size:11px; color:var(--muted); transition:transform 0.25s ease; display:inline-block; }
.rr-chevron.rr-collapsed{ transform:rotate(-90deg); }
.rr-card-body{ padding:0 18px 14px; }
.rr-card-body.rr-hidden{ display:none; }

.rr-item{ display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-top:1px solid var(--crema-dim); }
.rr-item:first-child{ border-top:none; }
.rr-status-btn{
  width:21px; height:21px; flex-shrink:0; border-radius:50%;
  border:2px solid var(--border); background:transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; color:var(--card-bg); margin-top:2px; padding:0; line-height:1;
}
.rr-item.progress .rr-status-btn{ border-color:var(--terracotta); background:var(--terracotta); color:var(--crema); }
.rr-item.done .rr-status-btn{ border-color:var(--moss); background:var(--moss); color:#fff; }
.rr-item-text{ flex:1; min-width:0; }
.rr-item-main{ font-size:14px; line-height:1.4; color:var(--ink); }
.rr-item.done .rr-item-main{ color:var(--muted); text-decoration:line-through; }
.rr-item-detail{ font-size:11.5px; color:var(--muted); margin-top:1px; line-height:1.3; }
.rr-item-owner{ font-size:11px; color:var(--moss); margin-top:2px; cursor:pointer; display:inline-flex; align-items:center; gap:3px; }
.rr-item-owner:hover{ text-decoration:underline; }
.rr-item-owner-input{ font-size:11px; color:var(--moss); border:none; border-bottom:1px solid var(--moss); background:transparent; outline:none; width:180px; font-family:var(--font-body); padding:0; margin-top:2px; }
.rr-del-btn{ background:none; border:none; color:var(--border); font-size:18px; cursor:pointer; padding:0 2px; line-height:1; flex-shrink:0; }
.rr-del-btn:hover{ color:var(--rust); }

.rr-add-row{ display:flex; gap:8px; margin-top:10px; }
.rr-add-row input{
  flex:1; border:1px solid var(--border); border-radius:8px; padding:8px 10px;
  font-size:13.5px; font-family:var(--font-body); background:var(--crema); color:var(--ink);
}
.rr-add-row input:focus{ outline:none; border-color:var(--terracotta); }
.rr-add-row button{ width:34px; border:none; border-radius:8px; background:var(--terracotta); color:#fff; font-size:18px; cursor:pointer; }
.rr-add-row button:hover{ background:var(--terracotta-dark); }

.rr-footer{ display:flex; align-items:center; justify-content:space-between; margin-top:16px; padding:0 4px 4px; font-size:11px; color:var(--muted); flex-wrap:wrap; gap:6px; }
.rr-reset-btn{ background:none; border:none; color:var(--muted); text-decoration:underline; cursor:pointer; font-size:11px; padding:0; }
.rr-reset-btn:hover{ color:var(--rust); }

.rr-loading{ padding:40px; text-align:center; color:var(--muted); font-family:var(--font-display); font-size:15px; }

.rr-budget-summary-num{ font-family:var(--font-display); font-weight:800; font-size:30px; color:var(--ink); }
.rr-budget-summary-label{ font-size:12.5px; color:var(--muted); }

.rr-budget-line-head{ cursor:pointer; user-select:none; }
.rr-budget-line-top{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
.rr-budget-line-label{ font-family:var(--font-display); font-weight:600; font-size:14px; color:var(--ink); }
.rr-budget-line-amt{ font-size:12.5px; font-weight:600; color:var(--ink); white-space:nowrap; }
.rr-budget-line-of{ font-weight:400; color:var(--muted); }
.rr-budget-line-bottom{ display:flex; align-items:center; justify-content:space-between; margin-top:5px; }
.rr-remaining-text{ font-size:11.5px; color:var(--moss); }
.rr-over-text{ font-size:11.5px; color:var(--rust); font-weight:600; }
.rr-budget-line-body{ margin-top:10px; padding-top:10px; border-top:1px solid var(--crema-dim); }

.rr-expense-amt{ color:var(--muted); font-weight:600; white-space:nowrap; }

.rr-contact-name{ font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--ink); }
.rr-contact-role{ font-size:11.5px; color:var(--terracotta); font-weight:600; margin-top:1px; }
.rr-contact-links{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
.rr-contact-link{ font-size:12px; color:var(--moss); text-decoration:none; display:inline-flex; align-items:center; gap:3px; }

.rr-contact-note{ font-size:11px; color:var(--muted); margin-top:4px; line-height:1.4; }

@media (max-width:480px){
  .rr-countdown-num{ font-size:38px; }
  .rr-brand-name{ font-size:18px; }
  .rr-header{ padding:20px 18px 18px; }
}

  function clone(o){ return JSON.parse(JSON.stringify(o)); }
  function statusNext(s){ return s === 'todo' ? 'progress' : s === 'progress' ? 'done' : 'todo'; }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(m){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'})[m];
    });
  }
  function countAll(){
    let total=0, done=0;
    state.categories.forEach(function(c){
      c.items.forEach(function(i){ total++; if(i.status==='done') done++; });
    });
    return { total: total, done: done };
  }
  function daysUntil(dateStr){
    const target = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    return Math.round((target - startToday) / 86400000);
  }

  function fmtMoney(n){
    const num = Number(n) || 0;
    const sign = num < 0 ? '-' : '';
    return sign + '$' + Math.abs(num).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
  }

  function lineSpent(line){
    return line.expenses.reduce(function(sum, e){ return sum + (Number(e.amount) || 0); }, 0);
  }

  function renderExpense(lineId, exp){
    return '' +

        '<button class="rr-del-btn" data-action="delete-expense" data-line="' + lineId + '" data-exp="' + exp.id + '" aria-label="Delete expense">&times;</button>' +
      '</div>';
  }

  function renderBudgetLine(line){
    const spent = lineSpent(line);
    const pct = line.budgeted ? Math.min(spent / line.budgeted * 100, 100) : 0;
    const over = spent > line.budgeted;
    const remaining = line.budgeted - spent;
    const isCollapsed = !!collapsed['budget-' + line.id];
    return '' +
      '<div class="rr-budget-line">' +
        '<div class="rr-budget-line-head" data-action="toggle-budget-line" data-line="' + line.id + '">' +
          '<div class="rr-budget-line-top">' +
            '<span class="rr-budget-line-label">' + escapeHtml(line.label) + '</span>' +
            '<span class="rr-budget-line-amt">' + fmtMoney(spent) + ' <span class="rr-budget-line-of">of ' + fmtMoney(line.budgeted) + '</span></span>' +
          '</div>' +
          '<div class="rr-budget-bar"><div class="rr-budget-bar-fill ' + (over ? 'rr-over' : '') + '" style="width:' + pct + '%"></div></div>' +
          '<div class="rr-budget-line-bottom">' +
            '<span class="' + (over ? 'rr-over-text' : 'rr-remaining-text') + '">' + (over ? fmtMoney(Math.abs(remaining)) + ' over budget' : fmtMoney(remaining) + ' left') + '</span>' +
            '<span class="rr-chevron ' + (isCollapsed ? 'rr-collapsed' : '') + '">&#9662;</span>' +
          '</div>' +
        '</div>' +
        '<div class="rr-budget-line-body ' + (isCollapsed ? 'rr-hidden' : '') + '">' +
          line.expenses.map(function(e){ return renderExpense(line.id, e); }).join('') +
          '<div class="rr-expense-add-row">' +
            '<input type="text" placeholder="Description" data-exp-desc="' + line.id + '" />' +
            '<input type="number" step="0.01" placeholder="$" data-exp-amt="' + line.id + '" />' +
            '<button data-action="add-expense" data-line="' + line.id + '" aria-label="Add expense">+</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

    if(dateInput){
      dateInput.addEventListener('change', async function(e){
        state.targetOpenDate = e.target.value;
        await saveState();
        render();
      });
    }
  }

  app.addEventListener('click', async function(e){
    const target = e.target.closest('[data-action]');
    if(!target) return;
    const action = target.dataset.action;

    if(action === 'cycle'){
      const cat = state.categories.find(function(c){ return c.id === target.dataset.cat; });
      const item = cat.items.find(function(i){ return i.id === target.dataset.item; });
      item.status = statusNext(item.status);
      await saveState(); render();
    } else if(action === 'delete'){
      const cat = state.categories.find(function(c){ return c.id === target.dataset.cat; });
      cat.items = cat.items.filter(function(i){ return i.id !== target.dataset.item; });
      await saveState(); render();
    } else if(action === 'add'){
      const catId = target.dataset.cat;
      const input = app.querySelector('[data-add-input="' + catId + '"]');
      const text = input.value.trim();
      if(!text) return;
      const cat = state.categories.find(function(c){ return c.id === catId; });
      cat.items.push({ id:'item-' + Date.now() + '-' + Math.random().toString(36).slice(2,7), text: text, detail:'', status:'todo' });
      await saveState(); render();
    } else if(action === 'toggle-cat'){
      collapsed[target.dataset.cat] = !collapsed[target.dataset.cat];
      render();
    } else if(action === 'toggle-budget-line'){
      const key = 'budget-' + target.dataset.line;
      collapsed[key] = !collapsed[key];
      render();
    } else if(action === 'add-expense'){
      const lineId = target.dataset.line;
      const descInput = app.querySelector('[data-exp-desc="' + lineId + '"]');
      const amtInput = app.querySelector('[data-exp-amt="' + lineId + '"]');
      const desc = descInput.value.trim();
      const amt = parseFloat(amtInput.value);
      if(!desc || isNaN(amt)) return;
      const line = state.budget.lines.find(function(l){ return l.id === lineId; });
      line.expenses.push({ id:'exp-' + Date.now() + '-' + Math.random().toString(36).slice(2,7), desc: desc, amount: amt });
      await saveState(); render();
    } else if(action === 'delete-expense'){
      const lineId = target.dataset.line;
      const line = state.budget.lines.find(function(l){ return l.id === lineId; });
      line.expenses = line.expenses.filter(function(e){ return e.id !== target.dataset.exp; });
      await saveState(); render();
    } else if(action === 'edit-owner'){
      const catId = target.dataset.cat;
      const itemId = target.dataset.item;
      const cat = state.categories.find(function(c){ return c.id === catId; });
      const item = cat && cat.items.find(function(i){ return i.id === itemId; });
      if(!item) return;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'rr-item-owner-input';
      input.value = item.owner || '';
      input.placeholder = 'Owner(s)';
      target.replaceWith(input);
      input.focus();
      async function saveOwner(){
        item.owner = input.value.trim();
        await saveState();
        render();
      }
      input.addEventListener('blur', saveOwner);
      input.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){ e.preventDefault(); input.blur(); }
        if(e.key === 'Escape'){ input.removeEventListener('blur', saveOwner); render(); }
      });
    } else if(action === 'reset'){
      if(confirm('Reset the tracker to the starting checklist? This clears all changes you\'ve made, including budget entries.')){
        state = defaultData();
        await saveState(); render();
      }
    }
  });

  app.addEventListener('keydown', async function(e){
    if(e.key === 'Enter' && e.target.matches('[data-add-input]')){
      const catId = e.target.dataset.addInput;
      const text = e.target.value.trim();
      if(!text) return;
      const cat = state.categories.find(function(c){ return c.id === catId; });
      cat.items.push({ id:'item-' + Date.now() + '-' + Math.random().toString(36).slice(2,7), text: text, detail:'', status:'todo' });
      await saveState(); render();
    } else if(e.key === 'Enter' && (e.target.matches('[data-exp-desc]') || e.target.matches('[data-exp-amt]'))){
      const lineId = e.target.dataset.expDesc || e.target.dataset.expAmt;
      const descInput = app.querySelector('[data-exp-desc="' + lineId + '"]');
      const amtInput = app.querySelector('[data-exp-amt="' + lineId + '"]');
      const desc = descInput.value.trim();
      const amt = parseFloat(amtInput.value);
      if(!desc || isNaN(amt)) return;
      const line = state.budget.lines.find(function(l){ return l.id === lineId; });
      line.expenses.push({ id:'exp-' + Date.now() + '-' + Math.random().toString(36).slice(2,7), desc: desc, amount: amt });
      await saveState(); render();
    }
  });

  async function init(){
    const loaded = await loadState();
    let needsSave = false;
    if(loaded){
      state = loaded;
      if(!state.budget){
        state.budget = defaultBudget();
        needsSave = true;
      }
    } else {
      state = defaultData();
      needsSave = true;
    }
    if(ensureEquipmentSeed()) needsSave = true;
    if(applyEquipmentQtyUpdate()) needsSave = true;
    if(ensureMarketingCategory()) needsSave = true;
    if(ensureExtraItems()) needsSave = true;
    if(applyPermitApproval()) needsSave = true;
    if(applySpreadsheetUpdates()) needsSave = true;
    if(ensureOwnerFields()) needsSave = true;
    if(ensureContactsAndNewItems()) needsSave = true;
    if(applyTitleAndItemUpdates()) needsSave = true;
    if(applyPhoneUpdates()) needsSave = true;
    if(applyOwnerPhoneUpdates()) needsSave = true;
    if(needsSave){ await saveState(); }
    render();
  }

  init();
})();
</script>
